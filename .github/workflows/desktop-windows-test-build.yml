name: Desktop Windows Test Build

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: Optional version label for the test artifact
        required: false
        default: 0.0.10-test

jobs:
  build:
    name: Build Windows desktop artifact
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unsigned Windows artifact
        shell: bash
        run: |
          bun run dist:desktop:artifact -- \
            --platform win \
            --target nsis \
            --arch x64 \
            --build-version "${{ github.event.inputs.build_version }}" \
            --verbose

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: t3code-windows-test-build
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
